name: Bug report
description: Report a reproducible Redix bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Redix version or commit
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5
  - type: dropdown
    id: redis-mode
    attributes:
      label: Redis deployment type
      options:
        - Standalone
        - Sentinel
        - Cluster
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add sanitized logs or screenshots. Do not include secrets or production data.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: TypeScript and Rust checks
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
